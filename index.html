<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Yuv's Surprise ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#ffc0cb;
font-family:'Pacifico',cursive;
text-align:center;
overflow:hidden;
}

#screen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
font-size:18px;
}

img{
width:200px;
margin:10px;
border-radius:15px;
}
</style>
</head>

<body>

<audio autoplay loop>
<source src="bg.mp3">
</audio>

<div id="screen">
<img src="mickey.png" width="150">
<h1>Hey Yuv...</h1>
<p>Ready for a surprise? 💖</p>
<button onclick="start()">Start</button>
</div>

<script>

function start(){
document.getElementById("screen").innerHTML = `
<h2>Choose the right door 🚪</h2>
<button onclick="wrong()">Door 1</button>
<button onclick="correct()">Door 2</button>
<button onclick="wrong()">Door 3</button>
`;
}

function wrong(){
alert("Arey galat ba 😂");
}

function correct(){
document.getElementById("screen").innerHTML = `
<h2>Yaad hai ye moments? ❤️</h2>
<img src="pic1.jpg">
<img src="pic2.jpg">
<img src="pic3.jpg">
<br>
<button onclick="quiz()">Next</button>
`;
}

function quiz(){
document.getElementById("screen").innerHTML = `
<h2>Riya tumhe sabse zyada kis naam se bulati hai? 😉</h2>
<input id="ans">
<br><br>
<button onclick="check()">Submit</button>
`;
}

function check(){
let val=document.getElementById("ans").value.toLowerCase();

if(val==="mera pyara bacha"){
message();
}else{
alert("Socho dhyaan se 😏");
}
}

function message(){
document.getElementById("screen").innerHTML = `
<p>
Yuv… I know you’ve always felt like your birthday brings bad luck…<br><br>
but I wish you could see yourself the way I see you ❤️<br><br>
You’re not a bad day… you’re one of the best things in my life 💖<br><br>
Happy Birthday in advance… just wait for the surprise 😌
</p>
<br>
<button onclick="final()">Continue</button>
`;
}

function final(){
document.body.innerHTML = `

<style>
body{
margin:0;
background:linear-gradient(45deg,#ff4da6,#ff99cc);
font-family:'Pacifico',cursive;
text-align:center;
color:white;
overflow:hidden;
}

.container{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

h1{
font-size:30px;
text-shadow:0 0 20px #fff;
}

.play-btn{
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff4da6;
font-size:18px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.heart{
position:absolute;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}
</style>

<div class="container">

<h1>
HAPPY BIRTHDAY MY LOVE ❤️🌚💋<br>
I LOVE YOU SO MUCH, ALWAYS 🫣🫶🏻💕
</h1>

<p>I made this for you… please listen ❤️</p>

<button class="play-btn" onclick="playAudio()">▶ Play Voice</button>

<audio id="voice">
<source src="yuv.mp3">
</audio>

</div>
`;

for(let i=0;i<20;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
}
}

function playAudio(){
document.getElementById("voice").play();
}

</script>

</body>
</html>
